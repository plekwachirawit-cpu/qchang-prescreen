<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Win / Loss — Q-Chang B2B</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
:root{--ink:#18181A;--ink2:#52525A;--ink3:#A0A0AA;--paper:#F7F6F2;--surface:#FFF;--rule:#E4E3DC;--rule2:#CCCBBF;--accent:#D64F2A;--accent-l:#FDF0EC;--green:#1A6B44;--green-l:#E8F5EE;--amber:#9A5800;--amber-l:#FFF4E0;--blue:#1A4FA0;--blue-l:#EAF0FC;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;min-height:100vh}
button{font-family:'IBM Plex Sans Thai',sans-serif;cursor:pointer}
input,select,textarea{font-family:'IBM Plex Sans Thai',sans-serif}

.topbar{background:var(--ink);color:#fff;padding:0 40px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:15px;font-weight:600;letter-spacing:-.01em}
.topbar-sep{width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 4px}
.topbar-sub{font-size:12px;color:rgba(255,255,255,.5)}
.topbar-sp{flex:1}
.topbar-link{color:rgba(255,255,255,.7);font-size:12px;text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .15s}
.topbar-link:hover{background:rgba(255,255,255,.1);color:#fff}
.topbar-link.active{background:rgba(255,255,255,.14);color:#fff}
.topbar-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:6px;padding:6px 14px;font-size:12px;transition:background .15s}
.topbar-btn:hover{background:rgba(255,255,255,.2)}

.page{max-width:1180px;margin:0 auto;padding:28px 24px 80px}
.dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.dash-title{font-size:22px;font-weight:600;letter-spacing:-.02em}
.dash-sub{font-size:13px;color:var(--ink2);margin-top:3px}
.head-actions{display:flex;gap:8px;align-items:center}
.btn-primary{background:var(--ink);color:#fff;border:none;border-radius:var(--r);padding:10px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:7px;transition:background .15s}
.btn-primary:hover{background:#333}
.btn-ghost{background:var(--surface);color:var(--ink2);border:1px solid var(--rule2);border-radius:var(--r);padding:9px 16px;font-size:13px;display:flex;align-items:center;gap:7px;transition:all .15s}
.btn-ghost:hover{background:var(--paper);border-color:var(--ink3)}

/* MONTH FILTER */
.month-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.month-sel{border:1px solid var(--rule2);border-radius:7px;background:var(--surface);font-size:13px;color:var(--ink);padding:8px 12px;outline:none;cursor:pointer;min-width:170px}
.month-sel:focus{border-color:var(--ink)}
.month-nav{width:34px;height:34px;border:1px solid var(--rule2);background:var(--surface);border-radius:7px;color:var(--ink2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.month-nav:hover{background:var(--paper);border-color:var(--ink3)}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:15px 18px;position:relative;overflow:hidden}
.kpi-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.kpi-n{font-size:27px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1}
.kpi-l{font-size:11px;color:var(--ink2);margin-top:6px}
.kpi-sub{font-size:10px;color:var(--ink3);margin-top:1px;font-family:'IBM Plex Mono',monospace}

/* TREND */
.trend{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:16px 18px 12px;margin-bottom:20px}
.trend-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.trend-title{font-size:12px;font-weight:600;color:var(--ink2)}
.trend-legend{display:flex;gap:14px;font-size:10px;color:var(--ink3)}
.lg{display:flex;align-items:center;gap:5px}
.lg-dot{width:9px;height:9px;border-radius:2px}
.trend-bars{display:flex;align-items:flex-end;gap:8px;height:104px;overflow-x:auto;padding-bottom:2px}
.tcol{flex:1;min-width:42px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.tcol-stack{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.tseg{border-radius:2px;min-height:0;transition:opacity .15s}
.tseg.w{background:var(--green)}
.tseg.l{background:var(--accent)}
.tcol-lbl{font-size:9px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.tcol.sel .tcol-lbl{color:var(--ink);font-weight:600}
.tcol.sel{background:var(--paper);border-radius:6px}
.tcol:hover .tseg{opacity:.82}

/* BOARD */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}
.col{background:var(--surface);border:1px solid var(--rule);border-radius:10px;display:flex;flex-direction:column;min-height:160px}
.col-head{padding:12px 15px;border-bottom:1px solid var(--rule);display:flex;align-items:center;gap:8px}
.col-bar{width:8px;height:8px;border-radius:50%}
.col-title{font-size:13px;font-weight:600}
.col-cnt{margin-left:auto;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--ink3);background:var(--paper);padding:2px 8px;border-radius:20px;border:1px solid var(--rule)}
.col-sum{font-size:10px;color:var(--ink3);font-family:'IBM Plex Mono',monospace;padding:0 15px 8px;margin-top:-2px}
.col-body{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:80px;transition:background .15s}
.col-body.drag-over{background:var(--blue-l)}

.card{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:11px 12px;cursor:grab;transition:box-shadow .15s,border-color .15s,transform .1s;position:relative}
.card:hover{border-color:var(--rule2);box-shadow:0 3px 14px rgba(0,0,0,.07)}
.card:active{cursor:grabbing}
.card.dragging{opacity:.45}
.card-name{font-size:13px;font-weight:500;line-height:1.4;padding-right:18px}
.card-client{font-size:11px;color:var(--ink2);margin-top:1px}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ctag{font-size:9px;padding:2px 7px;border-radius:10px;background:var(--surface);border:1px solid var(--rule);color:var(--ink2)}
.card-val{font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace;margin-top:8px}
.card-val.win{color:var(--green)}
.card-val.loss{color:var(--accent)}
.card-reason{font-size:11px;color:var(--ink3);margin-top:5px;line-height:1.45;font-style:italic}
.card-edit{position:absolute;top:9px;right:9px;width:20px;height:20px;border-radius:5px;border:none;background:none;color:var(--ink3);font-size:11px;display:none;align-items:center;justify-content:center}
.card:hover .card-edit{display:flex}
.card-edit:hover{background:var(--surface);color:var(--ink)}
.col-empty{font-size:11px;color:var(--ink3);text-align:center;padding:18px 8px;border:1.5px dashed var(--rule);border-radius:7px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:12px;padding:26px;width:440px;max-width:92vw;box-shadow:0 24px 60px rgba(0,0,0,.18);transform:translateY(8px);transition:transform .2s}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:600;margin-bottom:2px}
.modal-sub{font-size:12px;color:var(--ink2);margin-bottom:18px}
.seg{display:flex;gap:6px;margin-bottom:16px}
.seg-btn{flex:1;border:1.5px solid var(--rule2);background:var(--paper);border-radius:7px;padding:9px;font-size:12px;font-weight:500;color:var(--ink2);transition:all .15s}
.seg-btn.on-w{border-color:var(--green);background:var(--green-l);color:var(--green)}
.seg-btn.on-l{border-color:var(--accent);background:var(--accent-l);color:var(--accent)}
.seg-btn.on-p{border-color:var(--ink3);background:var(--paper);color:var(--ink)}
.form-field{margin-bottom:13px}
.form-label{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;display:block}
.form-input{width:100%;border:1px solid var(--rule2);border-radius:6px;padding:9px 12px;font-size:13px;background:var(--paper);color:var(--ink);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--ink);background:var(--surface)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{background:none;border:1px solid var(--rule2);border-radius:6px;padding:8px 16px;font-size:13px;color:var(--ink2)}
.btn-submit{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:13px;font-weight:500}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:880px){.kpi-row{grid-template-columns:repeat(2,1fr)}.board{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">Q-Chang B2B</div>
  <div class="topbar-sep"></div>
  <a class="topbar-link" href="index.html">โครงการ</a>
  <a class="topbar-link active" href="winloss.html">Win / Loss</a>
  <div class="topbar-sp"></div>
  <button class="topbar-btn" onclick="logout()">ออกจากระบบ</button>
</div>

<div class="page">
  <div class="dash-header">
    <div>
      <div class="dash-title">สรุป Win / Loss</div>
      <div class="dash-sub">ลากการ์ดเพื่อบันทึกผล · ดูรายเดือน · ส่งออก Excel</div>
    </div>
    <div class="head-actions">
      <button class="btn-ghost" onclick="exportXlsx()">⬇ ส่งออก Excel</button>
    </div>
  </div>

  <div class="month-bar">
    <button class="month-nav" onclick="stepMonth(-1)" title="ก่อนหน้า">‹</button>
    <select class="month-sel" id="month-sel" onchange="onMonthChange()"></select>
    <button class="month-nav" onclick="stepMonth(1)" title="ถัดไป">›</button>
  </div>

  <div class="kpi-row" id="kpi-row"></div>

  <div class="trend">
    <div class="trend-head">
      <div class="trend-title">แนวโน้มรายเดือน</div>
      <div class="trend-legend">
        <span class="lg"><span class="lg-dot" style="background:var(--green)"></span> ชนะ</span>
        <span class="lg"><span class="lg-dot" style="background:var(--accent)"></span> แพ้</span>
      </div>
    </div>
    <div class="trend-bars" id="trend-bars"></div>
  </div>

  <div class="board" id="board"></div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="m-title">บันทึกผล</div>
    <div class="modal-sub" id="m-sub">—</div>
    <div class="seg">
      <button class="seg-btn" id="seg-p" onclick="pickResult('')">รอผล</button>
      <button class="seg-btn" id="seg-w" onclick="pickResult('win')">ชนะ (Win)</button>
      <button class="seg-btn" id="seg-l" onclick="pickResult('loss')">แพ้ (Loss)</button>
    </div>
    <div class="form-row">
      <div class="form-field"><label class="form-label">มูลค่าโครงการ (บาท)</label><input class="form-input" type="number" id="m-value" placeholder="เช่น 2500000"></div>
      <div class="form-field"><label class="form-label">วันที่ปิดดีล</label><input class="form-input" type="date" id="m-closed"></div>
    </div>
    <div class="form-field"><label class="form-label">เหตุผล / หมายเหตุ</label><input class="form-input" id="m-reason" placeholder="เช่น ราคาแข่งขันได้ / แพ้เรื่อง timeline"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-submit" onclick="saveOutcome()">บันทึก</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="winloss.js"></script>
</body>
</html>
