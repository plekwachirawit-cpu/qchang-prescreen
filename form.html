<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pre-screen Form — Q-Chang B2B</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#18181A;--ink2:#52525A;--ink3:#A0A0AA;--paper:#F7F6F2;--surface:#FFF;--rule:#E4E3DC;--rule2:#CCCBBF;--accent:#D64F2A;--accent-l:#FDF0EC;--green:#1A6B44;--green-l:#E8F5EE;--amber:#9A5800;--amber-l:#FFF4E0;--purple:#4A3FA0;--purple-l:#EEECFB;--blue:#1A4FA0;--blue-l:#EAF0FC;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;min-height:100vh;padding-bottom:72px}
button{font-family:'IBM Plex Sans Thai',sans-serif;cursor:pointer}
input,select,textarea{font-family:'IBM Plex Sans Thai',sans-serif}

.topbar{background:var(--ink);color:#fff;padding:0 32px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.back-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:6px;padding:5px 12px;font-size:12px;text-decoration:none;display:flex;align-items:center;gap:5px;transition:background .15s}
.back-btn:hover{background:rgba(255,255,255,.2)}
.topbar-sep{width:1px;height:16px;background:rgba(255,255,255,.2)}
.topbar-proj{font-size:14px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.meta-strip{background:var(--surface);border-bottom:1px solid var(--rule);padding:12px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.mf{display:flex;flex-direction:column;gap:3px}
.ml{font-size:9px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.mi{border:none;border-bottom:1.5px solid var(--rule2);background:none;font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;color:var(--ink);padding:3px 0;outline:none;transition:border-color .15s;width:100%}
.mi:focus{border-bottom-color:var(--accent)}
.mi::placeholder{color:var(--ink3)}

/* TYPE STRIP */
.type-strip{background:var(--surface);border-bottom:1px solid var(--rule);padding:0 32px 13px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
.ts-f{display:flex;flex-direction:column;gap:4px}
.ts-l{font-size:9px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.ts-sel{border:1px solid var(--rule2);border-radius:6px;background:var(--paper);font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;color:var(--ink);padding:8px 10px;outline:none;transition:border-color .15s;cursor:pointer}
.ts-sel:focus{border-color:var(--accent);background:var(--surface)}
.ts-sel.set{border-color:var(--green);background:var(--green-l)}

.prog-wrap{background:var(--paper);border-bottom:1px solid var(--rule);padding:9px 32px;display:flex;align-items:center;gap:12px;position:sticky;top:52px;z-index:90}
.prog-track{flex:1;height:5px;background:var(--rule);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s ease}
.prog-lbl{font-size:11px;color:var(--ink2);font-family:'IBM Plex Mono',monospace;white-space:nowrap}
.prog-pct{font-size:11px;color:var(--green);font-family:'IBM Plex Mono',monospace;font-weight:500;min-width:34px;text-align:right}

.main{max-width:820px;margin:0 auto;padding:18px 24px;display:flex;flex-direction:column;gap:14px}
.intro{font-size:12px;color:var(--ink2);background:var(--surface);border:1px solid var(--rule);border-left:3px solid var(--accent);border-radius:var(--r);padding:10px 14px;line-height:1.6}

.sec{background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.sec-head{display:flex;align-items:center;gap:10px;padding:11px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--rule)}
.sec-head:hover{background:var(--paper)}
.sec-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.sec-title{font-size:13px;font-weight:600;flex:1}
.sec-cnt{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--ink3);background:var(--paper);padding:2px 8px;border-radius:20px;border:1px solid var(--rule)}
.sec-chev{font-size:11px;color:var(--ink3);transition:transform .2s;flex-shrink:0}
.sec-chev:not(.open){transform:rotate(-90deg)}
.sec-body{display:none}
.sec-body.open{display:block}

/* ITEM */
.item{border-bottom:1px solid var(--rule)}
.item:last-child{border-bottom:none}
.item-head{display:flex;align-items:flex-start;gap:10px;padding:12px 16px 8px;cursor:pointer}
.chkbox{width:18px;height:18px;flex-shrink:0;border:1.5px solid var(--rule2);border-radius:4px;background:var(--surface);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.item-head:hover .chkbox{border-color:var(--green)}
.item.checked .chkbox{background:var(--green);border-color:var(--green)}
.chk-mark{display:none;color:#fff;font-size:11px;font-weight:600;line-height:1}
.item.checked .chk-mark{display:block}
.item-right{flex:1;min-width:0}
.item-label{font-size:13px;font-weight:500;color:var(--ink);line-height:1.5}
.item-desc{font-size:11px;color:var(--ink3);margin-top:2px;line-height:1.4}
.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:10px;font-weight:500;margin-left:5px;letter-spacing:.03em;vertical-align:middle}
.t-must{background:var(--accent-l);color:var(--accent)}
.t-bant{background:var(--purple-l);color:var(--purple)}
.t-doc{background:var(--blue-l);color:var(--blue)}
.t-risk{background:var(--amber-l);color:var(--amber)}

/* ITEM FORM — always visible */
.item-form{padding:2px 16px 14px 44px}
.form-grid{display:grid;gap:11px;grid-template-columns:1fr 1fr}
.ff{display:flex;flex-direction:column;gap:4px}
.fl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em}
.fi{border:1px solid var(--rule2);border-radius:6px;padding:8px 10px;font-size:13px;background:var(--surface);color:var(--ink);outline:none;transition:border-color .2s;width:100%}
.fi:focus{border-color:var(--ink)}
.fi:not(:placeholder-shown){border-color:var(--green);background:var(--green-l)}
select.fi.set{border-color:var(--green);background:var(--green-l)}
.fi::placeholder{color:var(--ink3)}
textarea.fi{resize:vertical;min-height:54px;line-height:1.5}

/* FILE / DRIVE FIELD */
.file-row{display:flex;gap:7px;align-items:center}
.file-link{flex:1}
.file-btn{flex-shrink:0;border-radius:6px;padding:8px 11px;font-size:12px;font-weight:500;white-space:nowrap;transition:all .15s;border:1px solid var(--rule2);background:var(--surface);color:var(--ink2);display:flex;align-items:center;gap:4px}
.file-btn:hover{background:var(--paper);border-color:var(--ink3)}
.file-btn.open{background:var(--blue-l);color:var(--blue);border-color:rgba(26,79,160,.25)}
.file-btn.open:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.file-name{font-size:11px;color:var(--green);margin-top:2px;min-height:14px;display:flex;align-items:center;gap:6px}
.file-name a{color:var(--blue);text-decoration:none}
.file-name a:hover{text-decoration:underline}

/* GROUP LABEL */
.grp-lbl{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;padding:11px 16px 3px;background:var(--paper);border-top:1px solid var(--rule)}
.item + .grp-lbl{margin-top:0}

/* ORAL BLOCK */
.oral-block{margin:12px 16px 14px;background:var(--amber-l);border:1px solid #E5C86A;border-radius:var(--r);padding:12px 14px}
.oral-title{font-size:11px;font-weight:500;color:var(--amber);margin-bottom:8px}
.oral-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ofl{display:flex;flex-direction:column;gap:3px}
.oll{font-size:9px;font-weight:500;color:var(--amber);opacity:.7;text-transform:uppercase;letter-spacing:.06em}
.oi{border:none;border-bottom:1px solid #E5C86A;background:none;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;color:var(--ink);padding:3px 0;outline:none;width:100%}
.oi::placeholder{color:var(--amber);opacity:.45}
.ota{width:100%;border:1px solid #E5C86A;border-radius:4px;background:rgba(255,255,255,.6);font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;color:var(--ink);padding:6px 8px;resize:vertical;min-height:52px;outline:none;line-height:1.6}
.ota::placeholder{color:var(--amber);opacity:.45}

/* READINESS */
.r-wrap{display:flex;gap:8px;padding:12px 16px 14px}
.rb{flex:1;border-radius:var(--r);padding:10px;border:1.5px solid var(--rule2);cursor:pointer;text-align:center;transition:all .15s;background:var(--paper)}
.rb.sel-g{border-color:var(--green);background:var(--green-l)}
.rb.sel-a{border-color:#CC9200;background:var(--amber-l)}
.rb.sel-r{border-color:var(--accent);background:var(--accent-l)}
.rb-dot{width:10px;height:10px;border-radius:50%;margin:0 auto 5px}
.rb-lbl{font-size:11px;font-weight:500;color:var(--ink2)}
.rb-desc{font-size:10px;color:var(--ink3);margin-top:3px;line-height:1.4}

/* NOTES */
.note-wrap{margin:0 16px 14px;border:1px solid var(--rule2);border-radius:var(--r);overflow:hidden}
.note-lbl{font-size:9px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;padding:5px 10px;background:var(--paper);border-bottom:1px solid var(--rule)}
.note-ta{width:100%;border:none;background:none;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;color:var(--ink2);padding:8px 10px;resize:vertical;min-height:52px;outline:none;line-height:1.6}
.note-ta::placeholder{color:var(--ink3)}

/* ACTION BAR */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--rule);padding:10px 32px;display:flex;align-items:center;gap:10px;z-index:100}
.btn-pr{background:var(--ink);color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:13px;font-weight:500;transition:background .15s}
.btn-pr:hover{background:#333}
.btn-sec{background:none;color:var(--ink2);border:1px solid var(--rule2);border-radius:6px;padding:8px 16px;font-size:13px;transition:all .15s}
.btn-sec:hover{background:var(--paper)}
.act-sp{flex:1}
.act-lbl{font-size:12px;color:var(--ink3);font-family:'IBM Plex Mono',monospace}

.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;border-radius:8px;padding:10px 18px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="index.html">← กลับ</a>
  <div class="topbar-sep"></div>
  <div class="topbar-proj" id="tb-proj">—</div>
  <button class="back-btn" onclick="logout()" style="flex-shrink:0">ออกจากระบบ</button>
</div>

<div class="meta-strip">
  <div class="mf"><div class="ml">ชื่อโครงการ</div><input class="mi" id="m-name" placeholder="ชื่อโครงการ" oninput="saveMeta()"></div>
  <div class="mf"><div class="ml">ลูกค้า / แบรนด์</div><input class="mi" id="m-client" placeholder="ชื่อบริษัท" oninput="saveMeta()"></div>
  <div class="mf"><div class="ml">Sales</div><input class="mi" id="m-sales" placeholder="ชื่อ sales" oninput="saveMeta()"></div>
  <div class="mf"><div class="ml">วันที่</div><input class="mi" type="date" id="m-date" onchange="saveMeta()"></div>
</div>

<div class="type-strip">
  <div class="ts-f">
    <div class="ts-l">ประเภทโครงการ</div>
    <select class="ts-sel" id="m-ptype" onchange="saveMeta()">
      <option value="">— เลือกประเภทโครงการ —</option>
      <option>รีโนเวท (Renovation)</option>
      <option>สร้างใหม่ (New Construction)</option>
      <option>ต่อเติม / ขยายพื้นที่ (Extension)</option>
      <option>ปรับปรุงบางส่วน (Partial Renovation / Fit-out)</option>
      <option>งานระบบ (MEP / System)</option>
      <option>รื้อถอน (Demolition)</option>
    </select>
  </div>
  <div class="ts-f">
    <div class="ts-l">ประเภทอาคาร</div>
    <select class="ts-sel" id="m-btype" onchange="saveMeta()">
      <option value="">— เลือกประเภทอาคาร —</option>
      <option>อาคารสำนักงาน (Office)</option>
      <option>ห้างสรรพสินค้า / Retail</option>
      <option>คอนโด / ที่พักอาศัย</option>
      <option>โรงงาน / คลังสินค้า</option>
      <option>โรงแรม / รีสอร์ท</option>
      <option>โรงพยาบาล / คลินิก</option>
      <option>สถานศึกษา</option>
      <option>ร้านอาหาร / Café</option>
      <option>อาคารพาณิชย์ / Shophouse</option>
      <option>ศูนย์ประชุม / Event Space</option>
      <option>อื่นๆ</option>
    </select>
  </div>
</div>

<div class="prog-wrap">
  <span class="prog-lbl">ความครบถ้วน</span>
  <div class="prog-track"><div class="prog-fill" id="pg-fill" style="width:0%"></div></div>
  <span class="prog-pct" id="pg-pct">0%</span>
  <span class="prog-lbl"><span id="pg-done">0</span>/<span id="pg-tot">0</span> หัวข้อ</span>
</div>

<div class="main" id="main-content"></div>

<div class="action-bar">
  <button class="btn-sec" onclick="resetAll()">↺ ล้างข้อมูล</button>
  <div class="act-sp"></div>
  <span class="act-lbl" id="act-status">—</span>
  <button class="btn-sec" onclick="saveNow()">บันทึก</button>
  <button class="btn-pr" onclick="saveAndBack()">บันทึกและกลับ →</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ── AUTH CHECK ──────────────────────────────────
if(!localStorage.getItem('qc_auth')){location.href='login.html'}
function logout(){localStorage.removeItem('qc_auth');location.href='login.html'}

// ── DB ──────────────────────────────────────────
const SUPA_URL='https://zgcvjrwnhtpvhevnoeqs.supabase.co'
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnY3ZqcnduaHRwdmhldm5vZXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODMwMTQsImV4cCI6MjA5NjU1OTAxNH0.zAoLV-som-K01WaFhSzsbgavwL2xf_iPoBhzNgN9zUM'
const SUPA_H={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'}

// ── PROJECT ──────────────────────────────────────
const pid=new URLSearchParams(location.search).get('id')
let proj=null

async function getProj(){
  try{
    const r=await fetch(`${SUPA_URL}/rest/v1/projects?id=eq.${pid}&select=*`,{headers:SUPA_H})
    if(!r.ok) return null
    const rows=await r.json()
    return rows[0]||null
  }catch(e){return null}
}

async function saveProj(){
  if(!proj) return
  const data={
    name:proj.name||'',
    client:proj.client||'',
    sales:proj.sales||'',
    source:proj.source||'',
    budget:proj.budget||'',
    date:proj.date||'',
    ptype:proj.ptype||'',
    btype:proj.btype||'',
    readiness:proj.readiness||'ยังไม่ประเมิน',
    next_note:proj.nextNote||'',
    checks:proj.checks||{},
    fields:proj.fields||{},
    oral:proj.oral||{}
  }
  await fetch(`${SUPA_URL}/rest/v1/projects?id=eq.${proj.id}`,{
    method:'PATCH',
    headers:{...SUPA_H,'Prefer':'return=minimal'},
    body:JSON.stringify(data)
  })
}

// ── SCHEMA ────────────────────────────────────────
// field types: text | textarea | select | date | file
// file = Google Drive / URL link + attach button
const SECTIONS=[
{id:'s1',title:'ข้อมูลลูกค้า — Customer',color:'#4A3FA0',items:[
  {grp:'นิติบุคคล'},
  {id:'entity',label:'ข้อมูลนิติบุคคล',desc:'ใช้ออกใบเสนอราคา ใบแจ้งหนี้ และสัญญา',tags:['must'],req:true,
   fields:[
     {id:'company_name',label:'ชื่อนิติบุคคล (ตามทะเบียน)',type:'text',placeholder:'บริษัท ... จำกัด',span:2},
     {id:'tax_id',label:'เลขผู้เสียภาษี (Tax ID)',type:'text',placeholder:'0-0000-00000-00-0'},
     {id:'billing_addr',label:'Billing Address (ถ้าต่างจากทะเบียน)',type:'text',placeholder:'ระบุถ้าต่าง — พบบ่อยใน chain store'},
     {id:'reg_address',label:'ที่อยู่ตามทะเบียน',type:'textarea',placeholder:'เลขที่ ถนน แขวง/ตำบล เขต/อำเภอ จังหวัด รหัสไปรษณีย์',span:2}
   ]},
  {grp:'ผู้ติดต่อและอำนาจตัดสินใจ'},
  {id:'contact',label:'ผู้ติดต่อหลัก',tags:['must'],req:true,
   fields:[
     {id:'contact_name',label:'ชื่อ-นามสกุล',type:'text',placeholder:'ชื่อ นามสกุล'},
     {id:'contact_pos',label:'ตำแหน่ง',type:'text',placeholder:'เช่น Facility Manager'},
     {id:'contact_tel',label:'โทรศัพท์',type:'text',placeholder:'08x-xxx-xxxx'},
     {id:'contact_email',label:'Email',type:'text',placeholder:'email@company.com'}
   ]},
  {id:'authority',label:'อำนาจตัดสินใจ / Decision Maker',desc:'ผู้ติดต่อมีอำนาจจัดซื้อหรือต้องผ่านใคร',tags:['bant'],req:true,
   fields:[
     {id:'authority_status',label:'สถานะอำนาจของผู้ติดต่อ',type:'select',options:['','มีอำนาจตัดสินใจเอง','ต้องผ่านผู้บังคับบัญชา','ต้องผ่าน committee','ไม่ทราบ']},
     {id:'dm_name',label:'Decision Maker (ถ้าต่างจากผู้ติดต่อ)',type:'text',placeholder:'ชื่อ / ตำแหน่ง'}
   ]},
  {grp:'หน้างาน'},
  {id:'site',label:'Location หน้างานจริง',tags:['must'],req:true,
   fields:[
     {id:'site_address',label:'ที่อยู่หน้างาน + ชั้น',type:'textarea',placeholder:'ที่อยู่เต็ม + ชั้น + หมายเหตุ',span:2},
     {id:'site_access',label:'เงื่อนไขการเข้าพื้นที่',type:'text',placeholder:'เช่น ลงทะเบียนล่วงหน้า X วัน'},
     {id:'site_lift',label:'ลิฟต์บรรทุก',type:'select',options:['','มี','ไม่มี','ต้องประสาน']}
   ]},
]},
{id:'s2',title:'รายละเอียดโครงการ — Project',color:'#1A6B44',items:[
  {grp:'ขอบเขตงาน'},
  {id:'scope',label:'ขอบเขตงานโดยรวม',tags:['must'],req:true,
   fields:[
     {id:'work_type',label:'ลักษณะงาน',type:'select',options:['','รีโนเวทห้องน้ำ','ทาสี','กระจก / อลูมิเนียม','งานระบบไฟฟ้า','Fit-out สำนักงาน','Fit-out ร้านค้า','รื้อถอน','หลังคา','อื่นๆ']},
     {id:'work_area',label:'พื้นที่โดยประมาณ (ตร.ม.)',type:'text',placeholder:'เช่น 200'},
     {id:'work_detail',label:'รายละเอียดเพิ่มเติม',type:'textarea',placeholder:'ระบุขอบเขตงาน',span:2}
   ]},
  {grp:'เอกสารและไฟล์จากลูกค้า'},
  {id:'docs',label:'TOR / แบบ / ไฟล์จากลูกค้า',desc:'แนบไฟล์ หรือวางลิงก์ Google Drive ได้',tags:['doc'],

function buildItem(item){
  const row=document.createElement('div')
  row.className='item'; row.id='item-'+item.id

  const tags=(item.tags||[]).map(t=>{
    const map={must:'<span class="tag t-must">จำเป็น</span>',bant:'<span class="tag t-bant">BANT</span>',doc:'<span class="tag t-doc">เอกสาร</span>',risk:'<span class="tag t-risk">ตรวจสอบ</span>'}
    return map[t]||''
  }).join('')

  row.innerHTML=`
    <div class="item-head" onclick="checkItem('${item.id}')">
      <div class="chkbox"><span class="chk-mark">✓</span></div>
      <div class="item-right">
        <div class="item-label">${item.label}${tags}</div>
        ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
      </div>
    </div>
    <div class="item-form">${buildForm(item)}</div>`
  return row
}

function buildForm(item){
  if(!item.fields) return ''
  let html=`<div class="form-grid">`
  item.fields.forEach(f=>{
    const span=f.span===2?'style="grid-column:1/-1"':''
    html+=`<div class="ff" ${span}><div class="fl">${f.label}</div>`
    const fieldId=`f-${item.id}-${f.id}`
    if(f.type==='select'){
      html+=`<select class="fi" id="${fieldId}" onchange="onField('${item.id}','${f.id}',this)">`
      ;(f.options||[]).forEach(o=>html+=`<option value="${o}">${o||'— เลือก —'}</option>`)
      html+=`</select>`
    } else if(f.type==='textarea'){
      html+=`<textarea class="fi" id="${fieldId}" placeholder="${f.placeholder||''}" rows="3" oninput="onField('${item.id}','${f.id}',this)"></textarea>`
    } else if(f.type==='date'){
      html+=`<input class="fi" type="date" id="${fieldId}" onchange="onField('${item.id}','${f.id}',this)">`
    } else if(f.type==='file'){
      html+=`<div class="file-row">
        <input class="fi file-link" type="url" id="${fieldId}" placeholder="${f.placeholder||'วางลิงก์ Google Drive...'}" oninput="onField('${item.id}','${f.id}',this);renderFileName('${item.id}','${f.id}')">
        <button type="button" class="file-btn open" onclick="openLink('${fieldId}')">เปิด ↗</button>
        <button type="button" class="file-btn" onclick="document.getElementById('up-${item.id}-${f.id}').click()">📎 แนบไฟล์</button>
        <input type="file" id="up-${item.id}-${f.id}" style="display:none" onchange="uploadFile('${item.id}','${f.id}',this)">
      </div>
      <div class="file-name" id="fn-${item.id}-${f.id}"></div>`
    } else {
      html+=`<input class="fi" type="text" id="${fieldId}" placeholder="${f.placeholder||''}" oninput="onField('${item.id}','${f.id}',this)">`
    }
    html+=`</div>`
  })
  html+=`</div>`
  return html
}

// ── TOGGLE ────────────────────────────────────────
function toggleSec(id){
  const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id)
  b.classList.toggle('open'); c.classList.toggle('open')
}

function checkItem(id){
  const el=document.getElementById('item-'+id)
  el.classList.toggle('checked')
  proj.checks=proj.checks||{}
  proj.checks[id]=el.classList.contains('checked')
  saveProj(); updateProgress(); updateSecCounts()
}

// ── FIELDS ────────────────────────────────────────
function onField(itemId,fieldId,el){
  if(el.tagName==='SELECT') el.classList.toggle('set',!!el.value)
  saveField(itemId,fieldId,el.value)
}

function saveField(itemId,fieldId,value){
  proj.fields=proj.fields||{}
  if(!proj.fields[itemId]) proj.fields[itemId]={}
  proj.fields[itemId][fieldId]=value
  saveProj()
}

function openLink(id){
  let v=(document.getElementById(id).value||'').trim()
  if(!v){toast('ยังไม่มีลิงก์');return}
  if(!/^https?:\/\//i.test(v)) v='https://'+v
  window.open(v,'_blank','noopener')
}

function renderFileName(itemId,fid){
  const link=(document.getElementById(`f-${itemId}-${fid}`).value||'').trim()
  const nameEl=document.getElementById(`fn-${itemId}-${fid}`)
  if(!nameEl) return
  if(link) nameEl.innerHTML=`✓ มีลิงก์แนบแล้ว — <a href="${link.startsWith('http')?link:'https://'+link}" target="_blank" rel="noopener">เปิดดู</a>`
  else nameEl.textContent=''
}

async function uploadFile(itemId,fid,input){
  const file=input.files[0]; if(!file) return
  const linkEl=document.getElementById(`f-${itemId}-${fid}`)
  const nameEl=document.getElementById(`fn-${itemId}-${fid}`)
  nameEl.textContent='⏳ กำลังอัปโหลด '+file.name+' ...'
  try{
    const path=`${proj.id}/${Date.now()}_${file.name.replace(/[^\w.\-ก-๙]/g,'_')}`
    const r=await fetch(`${SUPA_URL}/storage/v1/object/attachments/${encodeURIComponent(path)}`,{
      method:'POST',
      headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'x-upsert':'true'},
      body:file
    })
    if(!r.ok) throw new Error('upload failed')
    const url=`${SUPA_URL}/storage/v1/object/public/attachments/${encodeURIComponent(path)}`
    linkEl.value=url
    saveField(itemId,fid,url)
    nameEl.innerHTML=`✓ ${file.name} — <a href="${url}" target="_blank" rel="noopener">เปิดดู</a>`
    toast('แนบไฟล์แล้ว ✓')
  }catch(e){
    nameEl.textContent=''
    toast('อัปโหลดไม่สำเร็จ — วางลิงก์ Google Drive แทนได้')
  }
  input.value=''
}

  ;['g','a','r'].forEach(k=>document.getElementById('rb-'+k).className='rb')

// ── PROGRESS ──────────────────────────────────────
function updateProgress(){
  const allItems=document.querySelectorAll('.item')
  const doneN=document.querySelectorAll('.item.checked').length
  const total=allItems.length
  const pct=total?Math.round(doneN/total*100):0
  document.getElementById('pg-fill').style.width=pct+'%'
  document.getElementById('pg-pct').textContent=pct+'%'
  document.getElementById('pg-done').textContent=doneN
  document.getElementById('pg-tot').textContent=total
  const reqItems=[...document.querySelectorAll('.item')].filter(el=>el.querySelector('.tag.t-must'))
  const reqDoneItems=reqItems.filter(el=>el.classList.contains('checked'))
  const s=document.getElementById('act-status')
  s.textContent=`จำเป็น: ${reqDoneItems.length}/${reqItems.length}`
  s.style.color=reqDoneItems.length===reqItems.length&&reqItems.length>0?'var(--green)':'var(--ink3)'
}

function updateSecCounts(){
  SECTIONS.forEach(sec=>{
    const secEl=document.getElementById('sec-'+sec.id); if(!secEl) return
    const all=secEl.querySelectorAll('.item').length
    const done=secEl.querySelectorAll('.item.checked').length
    const cnt=document.getElementById('cnt-'+sec.id)
    if(cnt) cnt.textContent=`${done}/${all}`
  })
}

// ── LOAD DATA ─────────────────────────────────────
function loadData(){
  if(!proj) return
  document.getElementById('m-name').value=proj.name||''
  document.getElementById('m-client').value=proj.client||''
  document.getElementById('m-sales').value=proj.sales||''
  document.getElementById('m-date').value=proj.date||''
  const pt=document.getElementById('m-ptype'); pt.value=proj.ptype||''; pt.classList.toggle('set',!!pt.value)
  const bt=document.getElementById('m-btype'); bt.value=proj.btype||''; bt.classList.toggle('set',!!bt.value)
  document.getElementById('tb-proj').textContent=proj.name||'ไม่ระบุชื่อ'

  Object.entries(proj.checks||{}).forEach(([id,val])=>{
    const el=document.getElementById('item-'+id)
    if(el) el.classList.toggle('checked',!!val)
  })

  Object.entries(proj.fields||{}).forEach(([itemId,fmap])=>{
    Object.entries(fmap).forEach(([fid,val])=>{
      const el=document.getElementById(`f-${itemId}-${fid}`)
      if(el){
        el.value=val||''
        if(el.tagName==='SELECT') el.classList.toggle('set',!!el.value)
        if(el.classList.contains('file-link')) renderFileName(itemId,fid)
      }
    })
  })

  const o=proj.oral||{}
  ;['person','dt','ch','sales','note'].forEach(k=>{
    const el=document.getElementById('oral-'+k)
    if(el) el.value=o[k]||''
  })
  const nn=document.getElementById('next-step-note')
  if(nn) nn.value=proj.nextNote||''

  if(proj.readiness){
    const rk=Object.keys(R_MAP).find(k=>R_MAP[k][0]===proj.readiness)
    if(rk) setR(rk)
  }
  updateProgress(); updateSecCounts()
}

  proj.name=document.getElementById('m-name').value

  proj.sales=document.getElementById('m-sales').value
  proj.date=document.getElementById('m-date').value
  const pt=document.getElementById('m-ptype'); proj.ptype=pt.value; pt.classList.toggle('set',!!pt.value)
  const bt=document.getElementById('m-btype'); proj.btype=bt.value; bt.classList.toggle('set',!!bt.value)
  document.getElementById('tb-proj').textContent=proj.name||'ไม่ระบุชื่อ'
  saveProj()
}

function resetAll(){
  if(!confirm('ล้างข้อมูลที่กรอกทั้งหมด?')) return
  proj.checks={}; proj.fields={}; saveProj()
  document.querySelectorAll('.item').forEach(el=>el.classList.remove('checked'))
  document.querySelectorAll('.fi').forEach(el=>{el.value='';el.classList.remove('set')})
  document.querySelectorAll('.file-name').forEach(el=>el.textContent='')
  ;['g','a','r'].forEach(k=>document.getElementById('rb-'+k).className='rb')
  updateProgress(); updateSecCounts(); toast('ล้างข้อมูลแล้ว')
}

async function saveNow(){await saveProj();toast('บันทึกแล้ว ✓')}

async function saveAndBack(){
  await saveProj(); toast('บันทึกแล้ว ✓')
  setTimeout(()=>location.href='index.html',600)
}

let _tt;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200)}

// ── BOOT ─────────────────────────────────────────
;(async()=>{
  proj=await getProj()
  if(!proj){location.href='index.html';return}
  buildUI();loadData()
})()
</script>
