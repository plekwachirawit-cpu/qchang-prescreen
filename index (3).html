<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ — B2B Project Living Renovation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#2B2A28;--ink2:#6E6B65;--ink3:#A8A49C;--paper:#F4F1EA;--paper2:#EDE9E0;--surface:#FCFBF7;--rule:#E2DDD2;--rule2:#CFC9BC;--accent:#C7613B;--accent-d:#A94E2D;--accent-l:#F6EAE3;--green:#5C7A57;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--paper);color:var(--ink);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}

/* soft ambient backdrop */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.5}
.blob.a{width:480px;height:480px;background:#F0DFD3;top:-140px;right:-120px}
.blob.b{width:420px;height:420px;background:#E7EADD;bottom:-160px;left:-120px}
.grain{position:absolute;inset:0;opacity:.5;background-image:radial-gradient(var(--rule) .5px,transparent .5px);background-size:22px 22px}

.card{position:relative;z-index:1;width:100%;max-width:392px;background:var(--surface);border:1px solid var(--rule);border-radius:var(--r);padding:38px 36px 32px;box-shadow:0 1px 0 rgba(255,255,255,.7) inset,0 18px 50px -28px rgba(60,50,40,.4)}

.mark{width:46px;height:46px;border-radius:12px;background:var(--accent-l);border:1px solid var(--rule2);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.mark span{width:18px;height:18px;border:2.5px solid var(--accent);border-radius:5px;display:block}

.eyebrow{font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-d);margin-bottom:8px}
.title{font-size:23px;font-weight:600;line-height:1.25;letter-spacing:-.01em;margin-bottom:28px}

.field{display:flex;flex-direction:column;gap:7px;margin-bottom:6px}
.flabel{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.input-wrap{position:relative;display:flex;align-items:center}
.pw{width:100%;border:1px solid var(--rule2);border-radius:9px;background:var(--paper);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:.06em;padding:13px 46px 13px 14px;outline:none;transition:border-color .18s,background .18s,box-shadow .18s}
.pw::placeholder{font-family:'IBM Plex Sans Thai',sans-serif;letter-spacing:0;color:var(--ink3)}
.pw:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 4px rgba(199,97,59,.12)}
.toggle{position:absolute;right:8px;width:32px;height:32px;border:none;background:none;color:var(--ink3);font-size:15px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:color .15s,background .15s}
.toggle:hover{color:var(--ink2);background:var(--paper2)}

.err{font-size:12px;color:var(--accent-d);min-height:16px;margin-top:8px;opacity:0;transform:translateY(-2px);transition:opacity .2s,transform .2s}
.err.show{opacity:1;transform:none}

.submit{width:100%;margin-top:18px;border:none;border-radius:9px;background:var(--ink);color:#fff;font-family:'IBM Plex Sans Thai',sans-serif;font-size:14px;font-weight:500;padding:13px;cursor:pointer;transition:background .18s,transform .06s;display:flex;align-items:center;justify-content:center;gap:8px}
.submit:hover{background:#000}
.submit:active{transform:translateY(1px)}

.foot{margin-top:22px;padding-top:18px;border-top:1px solid var(--rule);display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

.shake{animation:shake .4s}
@keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
@media (max-width:440px){.card{padding:30px 24px 26px}.title{font-size:20px}}
</style>
</head>
<body>
<div class="bg"><div class="blob a"></div><div class="blob b"></div><div class="grain"></div></div>

<div class="card" id="card">
  <div class="mark"><span></span></div>
  <div class="eyebrow">B2B Project</div>
  <h1 class="title">Living Renovation</h1>

  <form id="login-form" autocomplete="off">
    <div class="field">
      <div class="input-wrap">
        <input class="pw" id="pw" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" autofocus>
        <button class="toggle" id="toggle" type="button" aria-label="แสดง/ซ่อนรหัสผ่าน">👁</button>
      </div>
    </div>
    <div class="err" id="err">รหัสผ่านไม่ถูกต้อง</div>
    <button class="submit" type="submit">เข้าสู่ระบบ <span aria-hidden="true">→</span></button>
  </form>
</div>

<script>
const PASSWORD='abc12345'
const form=document.getElementById('login-form')
const pw=document.getElementById('pw')
const err=document.getElementById('err')
const card=document.getElementById('card')
const toggle=document.getElementById('toggle')

toggle.addEventListener('click',()=>{
  const show=pw.type==='password'
  pw.type=show?'text':'password'
  toggle.textContent=show?'🙈':'👁'
  pw.focus()
})

pw.addEventListener('input',()=>err.classList.remove('show'))

form.addEventListener('submit',e=>{
  e.preventDefault()
  if(pw.value===PASSWORD){
    try{sessionStorage.setItem('qc_auth','1')}catch(_){}
    location.href='index.html'
  }else{
    err.classList.add('show')
    card.classList.remove('shake')
    void card.offsetWidth
    card.classList.add('shake')
    pw.select()
  }
})
</script>
</body>
</html>
